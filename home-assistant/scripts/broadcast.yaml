# Reusable broadcast script
# Add this to your Home Assistant scripts.yaml or via the Scripts UI

olatoye_broadcast:
  alias: "Olatoye Academy — Broadcast Message"
  description: "Broadcasts a message to all Google Home speakers"
  fields:
    message:
      description: "The message to broadcast"
      example: "Elsie, Maths starts in 5 minutes"
  sequence:
    - service: google_assistant_sdk.send_text_command
      data:
        command: "broadcast {{ message }}"
