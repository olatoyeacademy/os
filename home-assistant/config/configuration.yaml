# Add these sections to your Home Assistant configuration.yaml
# Do NOT replace the whole file — append these at the bottom

# Enables the webhook trigger for incoming reminders from the schedule app
# The webhook ID must match the one used in schedule.html
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1

# Include automations from file
automation: !include automations.yaml

# Include scripts
script: !include_dir_merge_named scripts/
