# Olatoye Academy — Home Assistant Automations
# Add these to your automations.yaml in Home Assistant

# ─────────────────────────────────────────────
# WEBHOOK: Triggered from the schedule app
# Fires when you tap "Set Reminder" on a session
# ─────────────────────────────────────────────

- id: olatoye_webhook_reminder
  alias: "Olatoye Academy — Incoming Reminder"
  description: "Receives a reminder request from the schedule web app"
  trigger:
    - platform: webhook
      webhook_id: olatoye-reminder
      allowed_methods:
        - POST
      local_only: false
  action:
    - service: google_assistant_sdk.send_text_command
      data:
        command: >
          broadcast {{ trigger.json.message }}

# ─────────────────────────────────────────────
# SCHEDULED: Weekly recurring reminders
# Fires automatically every week — no tapping needed
# Times are set 5 minutes before each session starts
# ─────────────────────────────────────────────

# MONDAY
- id: olatoye_mon_circle_time
  alias: "Olatoye — Monday Circle Time"
  trigger:
    - platform: time
      at: "08:15:00"
  condition:
    - condition: time
      weekday: [mon]
  action:
    - service: script.olatoye_broadcast
      data:
        message: "Good morning everyone. Circle time starts in 5 minutes."

