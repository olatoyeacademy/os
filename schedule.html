<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olatoye Academy OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #9b9b9b;
      --border: rgba(0,0,0,0.12);
      --border-strong: rgba(0,0,0,0.25);
      --radius-md: 8px;
      --radius-lg: 12px;
      --elsie-bg: #EEEDFE;
      --elsie-text: #3C3489;
      --emma-bg: #E1F5EE;
      --emma-text: #085041;
      --both-bg: #FAEEDA;
      --both-text: #633806;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --bg-secondary: #2a2a2a;
        --text: #f0f0f0;
        --text-secondary: #a0a0a0;
        --text-tertiary: #6a6a6a;
        --border: rgba(255,255,255,0.12);
        --border-strong: rgba(255,255,255,0.25);
        --elsie-bg: #26215C;
        --elsie-text: #CECBF6;
        --emma-bg: #04342C;
        --emma-text: #9FE1CB;
        --both-bg: #412402;
        --both-text: #FAC775;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
    .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
    .logo { font-size: 20px; font-weight: 600; }
    .logo span { font-size: 13px; font-weight: 400; color: var(--text-secondary); display: block; margin-top: 2px; }
    .legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-elsie { background: #534AB7; }
    .dot-emma { background: #0F6E56; }
    .dot-both { background: #BA7517; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px 14px; }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-val { font-size: 24px; font-weight: 600; color: var(--text); }
    .week-nav { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; flex-wrap: wrap; }
    .week-nav button { background: none; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); padding: 4px 12px; cursor: pointer; color: var(--text-secondary); font-size: 13px; }
    .week-nav button:hover { background: var(--bg-secondary); }
    .controls { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: var(--bg); color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .filter-btn.active { background: var(--bg-secondary); color: var(--text); border-color: var(--border-strong); font-weight: 500; }
    .filter-btn:hover { background: var(--bg-secondary); }
    .add-btn { margin-left: auto; padding: 6px 18px; border-radius: var(--radius-md); border: 0.5px solid var(--border-strong); background: var(--text); color: var(--bg); font-size: 13px; cursor: pointer; font-weight: 500; }
    .add-btn:hover { opacity: 0.85; }
    .grid-wrap { overflow-x: auto; }
    table { min-width: 700px; width: 100%; border-collapse: collapse; }
    th { font-size: 12px; font-weight: 500; color: var(--text-secondary); padding: 8px 10px; text-align: left; border-bottom: 0.5px solid var(--border); }
    td { padding: 4px 6px; vertical-align: top; border-bottom: 0.5px solid var(--border); }
    .time-cell { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; padding: 8px 10px; }
    .slot { border-radius: 6px; padding: 5px 8px; margin: 2px 0; font-size: 12px; line-height: 1.4; cursor: pointer; }
    .slot:hover { opacity: 0.8; }
    .slot-elsie { background: var(--elsie-bg); color: var(--elsie-text); }
    .slot-emma { background: var(--emma-bg); color: var(--emma-text); }
    .slot-both { background: var(--both-bg); color: var(--both-text); }
    .slot-break { background: var(--bg-secondary); color: var(--text-tertiary); font-size: 11px; text-align: center; border-radius: 4px; padding: 3px 8px; }
    .slot-name { font-weight: 500; }
    .slot-tag { font-size: 10px; opacity: 0.75; margin-top: 1px; }
    .slot-done { opacity: 0.4; text-decoration: line-through; }
    .slot-actions { display: flex; gap: 6px; margin-top: 3px; }
    .act-btn { font-size: 10px; background: none; border: none; cursor: pointer; opacity: 0.55; color: inherit; padding: 0; }
    .act-btn:hover { opacity: 1; }
    /* Modal */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.5rem; width: 360px; max-width: 95vw; }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .form-row input, .form-row select { width: 100%; padding: 8px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-strong); background: var(--bg); color: var(--text); font-size: 14px; }
    .form-row input:focus, .form-row select:focus { outline: 2px solid #534AB7; outline-offset: 1px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel { padding: 8px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; }
    .btn-save { padding: 8px 16px; border-radius: var(--radius-md); border: none; background: #534AB7; color: #fff; font-size: 13px; cursor: pointer; font-weight: 500; }
    .btn-save:hover { background: #3C3489; }
    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .add-btn { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Olatoye Academy <span>Schedule Manager</span></div>
    <div class="legend">
      <div class="legend-item"><div class="dot dot-elsie"></div>Elsie</div>
      <div class="legend-item"><div class="dot dot-emma"></div>Emma</div>
      <div class="legend-item"><div class="dot dot-both"></div>Both</div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="week-nav">
    <button onclick="changeWeek(-1)">&#8592;</button>
    <span id="week-label"></span>
    <button onclick="changeWeek(1)">&#8594;</button>
    <span style="margin-left:auto;font-size:12px;color:var(--text-tertiary)">tap any session to mark done</span>
  </div>

  <div class="controls">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('Elsie',this)">Elsie</button>
    <button class="filter-btn" onclick="setFilter('Emma',this)">Emma</button>
    <button class="filter-btn" onclick="setFilter('Homeschool',this)">Homeschool</button>
    <button class="filter-btn" onclick="setFilter('Kings Interhigh',this)">Kings</button>
    <button class="filter-btn" onclick="setFilter('Kumon',this)">Kumon</button>
    <button class="filter-btn" onclick="setFilter('Activity',this)">Activity</button>
    <button class="add-btn" onclick="openModal()">+ Add session</button>
  </div>

  <div class="grid-wrap"><table id="grid"></table></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Add session</h3>
    <div class="form-row"><label>Subject / activity</label><input id="f-name" placeholder="e.g. Maths, Kumon, Cheer" /></div>
    <div class="form-row"><label>Day</label>
      <select id="f-day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select>
    </div>
    <div class="form-row"><label>Time slot</label>
      <select id="f-slot">
        <option>8:20 – 9:00</option><option>P1 (9:05 – 9:45)</option><option>P2 (9:50 – 10:30)</option>
        <option>P3 (10:45 – 11:25)</option><option>P4 (11:30 – 12:10)</option><option>P5 (12:50 – 1:30)</option>
        <option>P6 (1:35 – 2:15)</option><option>P7 (2:30 – 3:10)</option>
        <option>4:00 – 5:00</option><option>5:00 – 6:00</option><option>6:00 – 7:00</option><option>7:00 – 8:00</option>
      </select>
    </div>
    <div class="form-row"><label>For</label>
      <select id="f-who"><option value="Elsie">Elsie</option><option value="Emma">Emma</option><option value="Both">Both</option></select>
    </div>
    <div class="form-row"><label>Source</label>
      <select id="f-source"><option>Homeschool</option><option>Kings Interhigh</option><option>Kumon</option><option>Activity</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveSession()">Save</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const SLOTS = [
  {key:'morning',label:'8:20 – 9:00'},
  {key:'p1',label:'P1 (9:05 – 9:45)'},
  {key:'p2',label:'P2 (9:50 – 10:30)'},
  {key:'break1',label:'10:30 – 10:45',isBreak:true},
  {key:'p3',label:'P3 (10:45 – 11:25)'},
  {key:'p4',label:'P4 (11:30 – 12:10)'},
  {key:'lunch',label:'12:10 – 12:50',isBreak:true},
  {key:'p5',label:'P5 (12:50 – 1:30)'},
  {key:'p6',label:'P6 (1:35 – 2:15)'},
  {key:'break2',label:'2:15 – 2:30',isBreak:true},
  {key:'p7',label:'P7 (2:30 – 3:10)'},
  {key:'eve1',label:'4:00 – 5:00'},
  {key:'eve2',label:'5:00 – 6:00'},
  {key:'eve3',label:'6:00 – 7:00'},
  {key:'eve4',label:'7:00 – 8:00'},
];
const slotKeyMap = {
  '8:20 – 9:00':'morning','P1 (9:05 – 9:45)':'p1','P2 (9:50 – 10:30)':'p2',
  'P3 (10:45 – 11:25)':'p3','P4 (11:30 – 12:10)':'p4','P5 (12:50 – 1:30)':'p5',
  'P6 (1:35 – 2:15)':'p6','P7 (2:30 – 3:10)':'p7',
  '4:00 – 5:00':'eve1','5:00 – 6:00':'eve2','6:00 – 7:00':'eve3','7:00 – 8:00':'eve4'
};

let filter = 'all', weekOffset = 0, nextId = 31, editId = null;

let sessions = [
  {id:1,day:'Monday',slot:'morning',name:'Circle Time',who:'Elsie',source:'Homeschool',done:false},
  {id:2,day:'Tuesday',slot:'morning',name:'Circle Time',who:'Elsie',source:'Homeschool',done:false},
  {id:3,day:'Friday',slot:'morning',name:'Assembly',who:'Both',source:'Homeschool',done:false},
  {id:4,day:'Monday',slot:'p2',name:'French',who:'Elsie',source:'Homeschool',done:false},
  {id:5,day:'Wednesday',slot:'p1',name:'French',who:'Elsie',source:'Homeschool',done:false},
  {id:6,day:'Thursday',slot:'p1',name:'Humanities',who:'Elsie',source:'Homeschool',done:false},
  {id:7,day:'Friday',slot:'p1',name:'Science',who:'Elsie',source:'Homeschool',done:false},
  {id:8,day:'Monday',slot:'p3',name:'Humanities',who:'Elsie',source:'Homeschool',done:false},
  {id:9,day:'Tuesday',slot:'p3',name:'Art',who:'Elsie',source:'Homeschool',done:false},
  {id:10,day:'Tuesday',slot:'p4',name:'Art',who:'Elsie',source:'Homeschool',done:false},
  {id:11,day:'Wednesday',slot:'p4',name:'English',who:'Elsie',source:'Homeschool',done:false},
  {id:12,day:'Thursday',slot:'p4',name:'English',who:'Elsie',source:'Homeschool',done:false},
  {id:13,day:'Friday',slot:'p4',name:'Maths',who:'Elsie',source:'Homeschool',done:false},
  {id:14,day:'Monday',slot:'p5',name:'English',who:'Elsie',source:'Homeschool',done:false},
  {id:15,day:'Tuesday',slot:'p5',name:'Science',who:'Elsie',source:'Homeschool',done:false},
  {id:16,day:'Wednesday',slot:'p5',name:'STEM',who:'Elsie',source:'Homeschool',done:false},
  {id:17,day:'Monday',slot:'p6',name:'Maths',who:'Elsie',source:'Homeschool',done:false},
  {id:18,day:'Monday',slot:'p7',name:'Active Time',who:'Both',source:'Homeschool',done:false},
  {id:19,day:'Thursday',slot:'p7',name:'Maths',who:'Elsie',source:'Homeschool',done:false},
  {id:20,day:'Monday',slot:'eve1',name:'Emma Cheer',who:'Emma',source:'Activity',done:false},
  {id:21,day:'Tuesday',slot:'eve1',name:'Elsie Cheer',who:'Elsie',source:'Activity',done:false},
  {id:22,day:'Tuesday',slot:'eve2',name:'Elsie Cheer',who:'Elsie',source:'Activity',done:false},
  {id:23,day:'Wednesday',slot:'eve1',name:'Girls Swimming',who:'Both',source:'Activity',done:false},
  {id:24,day:'Wednesday',slot:'eve2',name:'Girls Swimming',who:'Both',source:'Activity',done:false},
  {id:25,day:'Monday',slot:'eve2',name:'Dinner',who:'Both',source:'Homeschool',done:false},
  {id:26,day:'Thursday',slot:'eve2',name:'Dinner',who:'Both',source:'Homeschool',done:false},
  {id:27,day:'Friday',slot:'eve2',name:'Dinner',who:'Both',source:'Homeschool',done:false},
  {id:28,day:'Tuesday',slot:'eve3',name:'Dinner',who:'Both',source:'Homeschool',done:false},
  {id:29,day:'Wednesday',slot:'eve3',name:'Dinner',who:'Both',source:'Homeschool',done:false},
  {id:30,day:'Monday',slot:'eve4',name:'Elsie Cheer',who:'Elsie',source:'Activity',done:false},
];

function slotClass(who){ return who==='Elsie'?'slot-elsie':who==='Emma'?'slot-emma':'slot-both'; }
function visible(s){ if(filter==='all') return true; if(filter==='Elsie') return s.who==='Elsie'||s.who==='Both'; if(filter==='Emma') return s.who==='Emma'||s.who==='Both'; return s.source===filter; }

function render(){
  renderStats(); renderWeekLabel();
  const grid = document.getElementById('grid');
  let html = '<thead><tr><th style="width:120px">Time</th>';
  DAYS.forEach(d=>html+=`<th>${d}</th>`);
  html += '</tr></thead><tbody>';
  SLOTS.forEach(slot=>{
    if(slot.isBreak){
      html += `<tr><td class="time-cell">${slot.label}</td>`;
      DAYS.forEach(()=>html+=`<td><div class="slot-break">${slot.label.includes('12')?'Lunch':'Break'}</div></td>`);
      html += '</tr>'; return;
    }
    html += `<tr><td class="time-cell">${slot.label}</td>`;
    DAYS.forEach(day=>{
      const items = sessions.filter(s=>s.day===day&&s.slot===slot.key&&visible(s));
      html += '<td>';
      items.forEach(s=>{
        html += `<div class="slot ${slotClass(s.who)} ${s.done?'slot-done':''}" onclick="toggleDone(${s.id})">
          <div class="slot-name">${s.name}${s.done?' ✓':''}</div>
          <div class="slot-tag">${s.source} · ${s.who}</div>
          <div class="slot-actions"><button class="act-btn" onclick="event.stopPropagation();deleteSession(${s.id})">✕ remove</button></div>
        </div>`;
      });
      html += '</td>';
    });
    html += '</tr>';
  });
  grid.innerHTML = html + '</tbody>';
}

function renderStats(){
  const v = sessions.filter(visible);
  const done = v.filter(s=>s.done).length;
  const elsie = sessions.filter(s=>s.who==='Elsie'||s.who==='Both').length;
  const emma = sessions.filter(s=>s.who==='Emma'||s.who==='Both').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total sessions</div><div class="stat-val">${v.length}</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val">${done}</div></div>
    <div class="stat-card"><div class="stat-label">Elsie</div><div class="stat-val">${elsie}</div></div>
    <div class="stat-card"><div class="stat-label">Emma</div><div class="stat-val">${emma}</div></div>`;
}

function renderWeekLabel(){
  const d = new Date(2026,3,14); d.setDate(d.getDate()+weekOffset*7);
  document.getElementById('week-label').textContent = 'Week of '+d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function changeWeek(d){ weekOffset+=d; renderWeekLabel(); }
function setFilter(f,btn){ filter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function toggleDone(id){ const s=sessions.find(x=>x.id===id); if(s) s.done=!s.done; render(); }
function deleteSession(id){ sessions=sessions.filter(x=>x.id!==id); render(); }
function openModal(){ editId=null; document.getElementById('modal-title').textContent='Add session'; document.getElementById('f-name').value=''; document.getElementById('modal-bg').classList.add('open'); }
function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); }
function saveSession(){
  const name=document.getElementById('f-name').value.trim(); if(!name) return;
  const slot=slotKeyMap[document.getElementById('f-slot').value]||'p1';
  sessions.push({id:nextId++,day:document.getElementById('f-day').value,slot,name,who:document.getElementById('f-who').value,source:document.getElementById('f-source').value,done:false});
  closeModal(); render();
}
document.getElementById('modal-bg').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-bg')) closeModal(); });
render();
</script>
</body>
</html>
